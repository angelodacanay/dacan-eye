<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magrabi Inventory Tools</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .tool-box {
            background-color: #ffffff;
            border: 1px solid #cceeff; 
            border-radius: 4px;
            width: 240px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .tool-box:hover {
            box-shadow: 0 4px 15px rgba(0, 174, 224, 0.15);
            border-color: #00aee0;
            transform: translateY(-2px);
        }

        .tool-title {
            color: #00aee0;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .tool-icon {
            width: 40px;
            height: 40px;
        }
        
        .tool-icon svg {
            width: 100%;
            height: 100%;
            stroke: #00aee0;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .footer p { margin: 5px 0; }
        .footer a {
            color: #00aee0;
            text-decoration: none;
            font-weight: bold;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            
            <a href="scanner.html" class="tool-box">
                <div class="tool-title">Barcode Scanner</div>
                <div class="tool-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 5v14M8 5v14M12 5v14M16 5v14M20 5v14"></path>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                    </svg>
                </div>
            </a>

            <a href="analyzer.html" class="tool-box">
                <div class="tool-title">OL Analyzer</div>
                <div class="tool-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                        <line x1="14.1" y1="14.1" x2="18" y2="18"></line>
                    </svg>
                </div>
            </a>

            <a href="decentration tool.html" class="tool-box">
                <div class="tool-title">Decentration Tool</div>
                <div class="tool-icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="2" x2="12" y2="22"></line>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                    </svg>
                </div>
            </a>
            
        </div>
    </div>

    <div class="footer">
        <p>Created by <a href="https://www.linkedin.com/in/angelodacan-eye/" target="_blank">Angelo</a></p>
        <p>For any comments and suggestions <a href="mailto:3393@magrabi.com">email me</a>.</p>
    </div>

</body>
</html>
